version: 2

models:
  - name: dim_customers
    description: "{{ doc('dim_customers') }}"
    columns:
      - name: customer_id
        description: "{{ doc('customer_id') }}"
        tests:
          - unique
          - not_null
      - name: full_name
        tests:
          - not_null
      - name: email
        tests:
          - not_null
      - name: state
        tests:
          - accepted_values:
             arguments:
              values: ['enabled', 'disabled']
      - name: is_active
        tests:
          - not_null

  - name: dim_products
    description: "{{ doc('dim_products') }}"
    columns:
      - name: product_id
        description: "{{ doc('product_id') }}"
        tests:
          - unique
          - not_null
      - name: title
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
             arguments:
              values: ['ACTIVE', 'DRAFT', 'ARCHIVED']
      - name: is_active
        tests:
          - not_null

  - name: fct_orders
    description: "{{ doc('fct_orders') }}"
    columns:
      - name: order_id
        description: "{{ doc('order_id') }}"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "{{ doc('customer_id') }}"
        tests:
          - relationships:
             arguments:
              to: ref('dim_customers')
              field: customer_id
      - name: order_status_category
        tests:
          - accepted_values:
             arguments:
              values: ['complete', 'paid_not_shipped', 'refunded', 'pending', 'other']
      - name: financial_status
        tests:
          - not_null
